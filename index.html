<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarRent - Website</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <!-- logo and search bar container -->
            <div class="logo-and-searchbar">
                <div class="logo">
              <h2>MORENT</h2> 
            </div>

            <div class="searchbar">

                <div class="search-icon-and-field">
                     <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="search-input" placeholder="Search something here">
                </div>
                <i class="fa-solid fa-sliders filter-icon"></i>
            </div>
            </div>

            <!-- heart, notification, setting and profile container -->
             <div class="heart-notification-setting-profile">
                <!-- heart -->
                <i class="fa-solid fa-heart"></i>
                <!-- notification -->
                <i class="fa-solid fa-bell"></i>
                <!-- setting -->
                 <i class="fa-solid fa-gear"></i>
                 <!-- profile -->
                  <div class="profile"></div>
             </div>
        </nav>
    </header>


    <!-- hero section -->
     <main>
        <div class="hero-section-main-cards">
            <!-- first card -->
            <div class="first-rent-car-card">
                <div class="first-card-content">
                    <h2 class="card-title">The Best Platform <br> For Car Rental</h2>
                    <p class="card-subtitle">Ease of doing a car rental safely and <br> reliably. Of course at a low price.</p>
                    <button class="btn-rental">Rental Car</button>
                </div>
                    <img src="images/image 7.png" alt="">
                
            </div>
            <!-- second card -->
             <div class="second-rent-car-card">
                 <div class="second-card-content">
                    <h2 class="card-title">Easy way to rent a <br> car at a low price</h2>
                    <p class="card-subtitle">Providing cheap car rental services <br> and safe and comfortable facilities.</p>
                    <button class="btn-rental2">Rental Car</button>
                </div>
                    <img src="images/image 8.png" alt="">
            </div>
        </div>

        <!-- Pickup and Drop-off section -->
         <div class="pickup-dropoff">
            <div class="pick-up">
            </div>
         </div>
     </main>
</body>
</html>
